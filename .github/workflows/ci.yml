name: Credit Risk Engine Continuous Integration Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Application Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic scikit-learn pandas numpy pytest flake8 httpx

    - name: Run Code Quality Linter (Flake8 Check)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. Adjust complexity or rules as needed
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Execute Automated Unit Tests (Pytest Engine)
      run: |
        pytest tests/